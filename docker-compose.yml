services:
  api:
    build: .
    container_name: agendrin-api
    working_dir: /app/backend
    command: >
      sh -c "
      python manage.py migrate &&
      python create_superuser.py || true &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-secret-key"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,.github.dev,.app.github.dev"

      # Banco SQLite persistente no workspace
      DATABASE_URL: "sqlite:////app/backend/db.sqlite3"

      # Redis (para celery / tarefas)
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: node:20
    container_name: agendrin-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - api

  redis:
    image: redis:7
    container_name: agendrin-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20